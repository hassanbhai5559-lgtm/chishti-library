<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chishti Library Books</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f8fc;
}

header{
background:linear-gradient(135deg,#00c853,#2196f3);
color:white;
text-align:center;
padding:30px;
}

header h1{
font-size:40px;
}

#bookshelf{
width:1200px;
max-width:100%;
height:700px;
margin:20px auto;
background:url('bookshelf.png') center center no-repeat;
background-size:100% 100%;
position:relative;
}

.book{
position:absolute;
width:110px;
cursor:pointer;
transition:1s;
}

.book img{
width:100%;
display:block;
border-radius:5px;
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.book:hover{
transform:translateY(-10px);
}

.book-title{
text-align:center;
font-weight:bold;
font-size:14px;
margin-top:8px;
color:#333;
}

.read-btn{
width:100%;
padding:8px;
margin-top:6px;
border:none;
border-radius:6px;
background:#00c853;
color:white;
font-weight:bold;
cursor:pointer;
}

.book.open{
left:50%!important;
top:200px!important;
transform:translateX(-50%) scale(1.8);
z-index:999;
}

footer{
background:linear-gradient(135deg,#00c853,#2196f3);
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}

@media(max-width:768px){

#bookshelf{
height:500px;
}

.book{
width:80px;
}

.book-title{
font-size:12px;
}

}

</style>

</head>

<body>

<header>
<h1>📚 Chishti Library Books</h1>
<p>Select a book to read online</p>
</header>

<div id="bookshelf"></div>

<footer>
<p>© 2026 Chishti Library</p>
</footer>

<script>

fetch("books.json")
.then(res => res.json())
.then(data => {

const shelf = document.getElementById("bookshelf");

data.forEach((book,index)=>{

const div = document.createElement("div");
div.className = "book";

/* SHELF POSITIONS */

const positions = [
{left:"28%", top:"48%"},
{left:"43%", top:"48%"},
{left:"58%", top:"48%"},
{left:"73%", top:"48%"},
{left:"20%", top:"73%"},
{left:"35%", top:"73%"},
{left:"50%", top:"73%"},
{left:"65%", top:"73%"}
];

if(positions[index]){
div.style.left = positions[index].left;
div.style.top = positions[index].top;
}

div.innerHTML = `
<img src="${book.cover}" alt="${book.title}">
<div class="book-title">${book.title}</div>
<button class="read-btn">📖 Read Online</button>
`;

div.querySelector(".read-btn").onclick = function(e){

e.stopPropagation();

div.classList.add("open");

setTimeout(()=>{
window.location.href = book.reader;
},1200);

};

shelf.appendChild(div);

});

})
.catch(error=>{
console.log(error);
alert("books.json not found");
});

</script>

</body>
</html>
