<!DOCTYPE html>
<html>
<head>
<title>Saim Chishti Library</title>
<style>
body{font-family:Arial;background:#0b1220;color:white;margin:0}
header{padding:20px;text-align:center;background:#111a2e;color:#00e5ff}
.container{padding:20px;max-width:800px;margin:auto}

input,textarea{
width:100%;padding:10px;margin:10px 0;border:none;border-radius:5px;
}

button{
padding:10px 15px;background:#00e5ff;border:none;cursor:pointer;font-weight:bold
}

.book-box{
margin-top:20px;padding:10px;background:#111a2e;border-radius:10px
}
a{color:#00e5ff;text-decoration:none}
</style>
</head>

<body>

<header>
<h1>📚 Saim Chishti Library</h1>
<p>World Class Digital Library</p>
</header>

<div class="container">

<h2>📤 Upload Book (Owner Panel)</h2>

<input id="title" placeholder="Book Title">
<textarea id="content" placeholder="Paste Book Content Here"></textarea>

<button onclick="saveBook()">Save Book</button>

<div class="book-box">
<h3>📖 View Books</h3>
<a href="books.html">Go to Library →</a>
</div>

</div>

<script>
function saveBook(){
let title = document.getElementById("title").value;
let content = document.getElementById("content").value;

if(!title || !content){
alert("Fill both fields");
return;
}

let books = JSON.parse(localStorage.getItem("books") || "[]");

books.push({title, content});

localStorage.setItem("books", JSON.stringify(books));

alert("Book Saved!");
document.getElementById("title").value="";
document.getElementById("content").value="";
}
</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
<title>Library Books</title>
<style>
body{font-family:Arial;background:#0b1220;color:white;margin:0}
header{padding:15px;text-align:center;background:#111a2e;color:#00e5ff}

.container{padding:20px;max-width:900px;margin:auto}

.book{
background:#111a2e;
padding:15px;
margin:10px 0;
border-radius:10px;
cursor:pointer;
}

.reader{
margin-top:20px;
background:#1a2a6c;
padding:20px;
border-radius:10px;
white-space:pre-line;
}

button{
padding:10px;
background:#00e5ff;
border:none;
cursor:pointer;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<h1>📚 Library Books</h1>
</header>

<div class="container">

<h2>Available Books</h2>
<div id="list"></div>

<div id="reader" class="reader" style="display:none;"></div>

<button onclick="goBack()">⬅ Back Home</button>

</div>

<script>

let books = JSON.parse(localStorage.getItem("books") || "[]");

let list = document.getElementById("list");

books.forEach((b,i)=>{
let div = document.createElement("div");
div.className="book";
div.innerHTML="📖 "+b.title;
div.onclick=()=>openBook(i);
list.appendChild(div);
});

function openBook(i){
document.getElementById("reader").style.display="block";
document.getElementById("reader").innerHTML=
"<h2>"+books[i].title+"</h2><p>"+books[i].content+"</p>";
}

function goBack(){
window.location.href="index.html";
}

</script>

</body>
</html>
