<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chishti Library Books</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f8fc;
}

header{
background:linear-gradient(135deg,#00c853,#2196f3);
color:white;
text-align:center;
padding:30px;
}

header h1{
font-size:40px;
}


<footer>
<p>© 2026 Chishti Library</p>
</footer>

<script>

fetch("books.json")
.then(res => res.json())
.then(data => {



data.forEach((book,index)=>{

const div = document.createElement("div");
div.className = "book";

/* SHELF POSITIONS */

const positions = [
{left:"28%", top:"48%"},
{left:"43%", top:"48%"},
{left:"58%", top:"48%"},
{left:"73%", top:"48%"},
{left:"20%", top:"73%"},
{left:"35%", top:"73%"},
{left:"50%", top:"73%"},
{left:"65%", top:"73%"}
];

if(positions[index]){
div.style.left = positions[index].left;
div.style.top = positions[index].top;
}

div.innerHTML = `
<img src="${book.cover}" alt="${book.title}">
<div class="book-title">${book.title}</div>
<button class="read-btn">📖 Read Online</button>
`;

div.querySelector(".read-btn").onclick = function(e){

e.stopPropagation();

div.classList.add("open");

setTimeout(()=>{
window.location.href = book.reader;
},1200);

};

shelf.appendChild(div);

});

})
.catch(error=>{
console.log(error);
alert("books.json not found");
});

</script>

</body>
</html>
