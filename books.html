<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chishti Library Books</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f8fc;
}

header{
background:linear-gradient(135deg,#00c853,#2196f3);
color:white;
text-align:center;
padding:30px;
}

#bookshelf{
width:100%;
height:700px;
background:url('bookshelf.png') center center no-repeat;
background-size:contain;
position:relative;
margin-top:20px;
}

.book{
position:absolute;
width:120px;
cursor:pointer;
transition:1s;
}

.book img{
width:100%;
display:block;
border-radius:5px;
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.book:hover{
transform:translateY(-10px);
}

.book.open{
left:50%!important;
top:200px!important;
transform:translateX(-50%) scale(1.8);
z-index:999;
}

footer{
background:linear-gradient(135deg,#00c853,#2196f3);
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}
</style>

</head>

<body>

<header>
<h1>📚 Chishti Library Books</h1>
<p>Select a book to read online</p>
</header>

<div id="bookshelf"></div>

<footer>
<p>© 2026 Chishti Library</p>
</footer>

<script>

fetch("books.json")
.then(res => res.json())
.then(data => {

const shelf = document.getElementById("bookshelf");

data.forEach((book,index)=>{

const div = document.createElement("div");
div.className = "book";

div.style.left = (150 + index*180) + "px";
div.style.top = "180px";

div.innerHTML =
`<img src="${book.cover}" alt="${book.title}">`;

div.onclick = function(){

div.classList.add("open");

setTimeout(()=>{
window.location.href = book.reader;
},1200);

};

shelf.appendChild(div);

});

});

</script>

</body>
</html>
