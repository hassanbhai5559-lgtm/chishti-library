<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chishti Library Books</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f8fc;
}

header{
background:linear-gradient(135deg,#00c853,#2196f3);
color:white;
text-align:center;
padding:30px;
}

header h1{
font-size:40px;
}

#bookshelf{
width:100%;
height:700px;
background:url('bookshelf.png') center center no-repeat;
background-size:contain;
position:relative;
margin-top:20px;
}

.book{
position:absolute;
width:120px;
transition:1s;
cursor:pointer;
}

.book img{
width:100%;
display:block;
border-radius:6px;
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.book:hover{
transform:translateY(-10px);
}

.book-title{
text-align:center;
font-weight:bold;
margin-top:8px;
font-size:14px;
color:#333;
}

.read-btn{
width:100%;
padding:8px;
margin-top:6px;
border:none;
border-radius:6px;
background:#00c853;
color:white;
font-weight:bold;
cursor:pointer;
}

.book.open{
left:50%!important;
top:220px!important;
transform:translateX(-50%) scale(1.8);
z-index:999;
}

footer{
background:linear-gradient(135deg,#00c853,#2196f3);
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}

</style>

</head>

<body>

<header>
<h1>📚 Chishti Library Books</h1>
<p>Select a book to read online</p>
</header>

<div id="bookshelf"></div>

<footer>
<p>© 2026 Chishti Library</p>
</footer>

<script>

#bookshelf{
    width:1200px;
    height:700px;
    margin:20px auto;
    background:url('bookshelf.png') center center no-repeat;
    background-size:100% 100%;
    position:relative;
}

.book{
    position:absolute;
    width:100px;
    transition:1s;
    cursor:pointer;
}

.book img{
    width:100%;
    display:block;
    border-radius:4px;
    box-shadow:0 5px 15px rgba(0,0,0,.3);
}

</script>

</body>
</html>
