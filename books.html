<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chishti Library Books</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f8fc;
}

header{
background:linear-gradient(135deg,#00c853,#2196f3);
color:white;
text-align:center;
padding:30px;
}

header h1{
font-size:40px;
}

#bookshelf{
width:1200px;
max-width:100%;
height:700px;
margin:20px auto;
background:url('bookshelf.png') center center no-repeat;
background-size:100% 100%;
position:relative;
}

.book{
position:absolute;
width:120px;
text-align:center;
}

.book img{
width:100%;
border-radius:6px;
box-shadow:0 5px 15px rgba(0,0,0,.3);
transition:.4s;
}

.book img:hover{
transform:translateY(-10px);
}

.book-title{
margin-top:8px;
font-size:14px;
font-weight:bold;
color:#333;
}

.read-btn{
display:block;
margin-top:6px;
padding:8px;
background:#00c853;
color:white;
text-decoration:none;
border-radius:6px;
font-size:13px;
font-weight:bold;
}

footer{
background:linear-gradient(135deg,#00c853,#2196f3);
color:white;
text-align:center;
padding:20px;
}

</style>

</head>
<body>

<header>
<h1>📚 Chishti Library Books</h1>
<p>Select a book to read online</p>
</header>

<div id="bookshelf"></div>

<footer>
<p>© 2026 Chishti Library</p>
</footer>

<script>

fetch("books.json")
.then(res => res.json())
.then(data => {

const shelf = document.getElementById("bookshelf");

const positions = [
{left:"28%", top:"42%"},
{left:"43%", top:"42%"},
{left:"58%", top:"42%"},
{left:"73%", top:"42%"},
{left:"20%", top:"68%"},
{left:"35%", top:"68%"},
{left:"50%", top:"68%"},
{left:"65%", top:"68%"}
];

data.forEach((book,index)=>{

const div=document.createElement("div");
div.className="book";

if(positions[index]){
div.style.left=positions[index].left;
div.style.top=positions[index].top;
}

div.innerHTML=`
<img src="${book.cover}" alt="${book.title}">
<div class="book-title">${book.title}</div>
<a href="${book.reader}" class="read-btn">📖 Read Online</a>
`;

shelf.appendChild(div);

});

})
.catch(error=>{
console.log(error);
});

</script>

</body>
</html>
